default_provider: passthrough   # passthrough | anthropic | ollama | lms | nvidia | <any key in providers>

# ---- Model tier -----------------------------------------------------------
# Substring match against the resolved model name. A "weak" model gets a single
# constraint repair-nudge when it violates a spec constraint; strong/unknown
# models do NOT (re-stating a banned token primes them toward it — the measured
# qwen3.5 regression). Repair on the external TEST signal is unaffected by this.
weak_models:
  - 8b
  - 7b
  - 3b
  - 1b
  - mini

providers:
  anthropic:
    default_model: claude-sonnet-4-6
    # api_key: sk-ant-...   (prefer ANTHROPIC_API_KEY env var)

  ollama:
    default_model: llama3.1
    base_url: http://localhost:11434

  lms:
    type: openai_compatible
    default_model: openai/gpt-oss-20b
    base_url: http://localhost:1234/v1
    # No api_key needed for local LM Studio.

  nvidia:
    type: openai_compatible
    default_model: openai/gpt-oss-120b
    base_url: https://integrate.api.nvidia.com/v1
    # api_key: nvapi-...   (use NVIDIA_API_KEY env var)

  # openai:
  #   type: openai_compatible
  #   default_model: gpt-4o
  #   base_url: https://api.openai.com/v1

  # groq:
  #   type: openai_compatible
  #   default_model: llama-3.3-70b-versatile
  #   base_url: https://api.groq.com/openai/v1

  # openrouter:
  #   type: openai_compatible
  #   default_model: openai/gpt-4o
  #   base_url: https://openrouter.ai/api/v1

# Per-agent provider overrides. Empty by default — every agent uses
# `default_provider` above. Uncomment + customise to route specific spec-
# pipeline phases to specific providers. Example for an LM-Studio + NIM mix:
#
# agent_providers:
#   delivery_manager:        lms       # local for cheap planning phases
#   system_architect:        nvidia    # frontier model for architecture
#   business_analyst:        lms
#   sdet:                    nvidia    # frontier for test design
#   fullstack_developer:     nvidia    # frontier for actual code
#
# Set MAGENT_INSECURE_SSL=1 if Avast/proxy MITM-intercepts HTTPS.
agent_providers: {}

model_per_agent: {}
#   system_architect: claude-opus-4-6

# ---- Sampling temperature -------------------------------------------------
# Lower temperature raises code pass@1 (less nondeterminism); design/ideation
# agents are left warm at the provider default. Precedence:
#   agent_temperature[agent] > code_temperature (if agent in code_agents)
#                            > default_temperature > provider default (unset).
default_temperature: null      # null = provider default for non-code agents
code_temperature: 0.1          # applied to every agent in code_agents below
agent_temperature: {}          # explicit per-agent override (wins over all)

# ---- Best-of-N (execution-selected candidates in magent_implement) ---------
# On the first attempt, sample N candidate implementations at a higher
# temperature and keep the one that passes the failing test. 1 = off (single
# sample, today's behaviour). Only fires when a real provider executes code;
# inert under passthrough. Helps weak local models most.
code_best_of_n: 1
code_best_of_n_temperature: 0.4
code_agents:   # matches the agents carrying CodeDisciplineMixin
  - android_developer
  - api_developer
  - automation_qa
  - cli_installer_developer
  - dotnet_backend
  - flutter_developer
  - fullstack_developer
  - go_backend
  - hono_developer
  - integration_specialist
  - ios_developer
  - java_backend
  - mobile_developer
  - nextjs_developer
  - nodejs_backend
  - php_developer
  - python_backend
  - qa_engineer
  - react_developer
  - react_native_developer
  - refactoring_specialist
  - rust_backend
  - sdet
  - svelte_developer
  - tui_developer
  - vue_developer
