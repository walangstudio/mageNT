# mageNT — multi-mode dispatch map.
#
# For each agent/skill the installer chooses one of three delivery modes:
#   subagent   - Claude Code subagent (~/.claude/agents/magent-<name>.md)
#   skill      - Claude Code skill   (~/.claude/skills/magent-<name>/SKILL.md)
#   mcp_only   - MCP tool only (current behaviour)
#
# `mcp_fallback: true` means the agent is also exposed as the existing
# `consult_<name>` MCP tool, so non-Claude-Code clients still see it.
#
# `tools` is the Claude Code tool allow-list written into the frontmatter.
# Audit/review subagents are read-only; only scaffolders get Edit/Write.
#
# NOTE: `--profile teams` IGNORES the per-agent `tools:` below. There a
# writer/reviewer classification in tools/generate_dispatch.py
# (TEAMS_READONLY_AGENTS) is authoritative: reviewers/QA/coordinator/advisory
# stay read-only; architects, devops, technical_writer, and every developer
# get Read,Grep,Glob,Bash,Edit,Write so a spawned team can actually build.

agents:
  # --- review / audit subagents (read-only) ---
  security_engineer:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  qa_engineer:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  automation_qa:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  sdet:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  performance_engineer:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  debugging_expert:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  system_architect:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  delivery_manager:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  database_administrator:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  devops_engineer:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  cloud_architect:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]
  cloudflare_expert:
    mode: subagent
    mcp_fallback: true
    model: sonnet
    tools: [Read, Grep, Glob, Bash]

  # --- Coordination (Claude Code agent teams) ---
  team_lead:
    mode: subagent
    mcp_fallback: false
    tools: [Read, Grep, Glob, Bash]

  # --- advisory skills (workflow knowledge, not autonomous coders) ---
  business_analyst:
    mode: skill
    mcp_fallback: true
    tools: [Read, Grep, Glob]
  product_manager:
    mode: skill
    mcp_fallback: true
    tools: [Read, Grep, Glob]
  ui_ux_designer:
    mode: skill
    mcp_fallback: true
    tools: [Read, Grep, Glob]
  technical_writer:
    mode: skill
    mcp_fallback: true
    tools: [Read, Grep, Glob, Edit, Write]

  # --- framework/language developers stay MCP-only ---
  # They are pattern-driven personas best invoked via consult_<name>.
  android_developer:        {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  api_developer:            {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  cli_installer_developer:  {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  dotnet_backend:           {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  flutter_developer:        {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  fullstack_developer:      {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  go_backend:               {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  hono_developer:           {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  integration_specialist:   {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  ios_developer:            {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  java_backend:             {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  mobile_developer:         {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  nextjs_developer:         {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  nodejs_backend:           {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  php_developer:            {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  python_backend:           {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  react_developer:          {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  react_native_developer:   {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  rust_backend:             {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  svelte_developer:         {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  tui_developer:            {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}
  vue_developer:            {mode: mcp_only, tools: [Read, Grep, Glob, Bash, Edit, Write]}

skills:
  scaffold_react:    {mode: skill, tools: [Read, Write, Edit, Bash]}
  scaffold_nextjs:   {mode: skill, tools: [Read, Write, Edit, Bash]}
  scaffold_fastapi:  {mode: skill, tools: [Read, Write, Edit, Bash]}
  scaffold_express:  {mode: skill, tools: [Read, Write, Edit, Bash]}
  generate_tests:    {mode: skill, tools: [Read, Write, Edit, Grep, Glob]}
  run_tests:         {mode: skill, tools: [Read, Bash, Grep, Glob]}
  security_scan:     {mode: skill, tools: [Read, Grep, Glob, Bash]}
  debug_code:        {mode: skill, tools: [Read, Grep, Glob, Bash]}
  analyze_error:     {mode: skill, tools: [Read, Grep, Glob, Bash]}
  check_versions:    {mode: skill, tools: [Read, Bash]}

  # --- Phase 7 spec pipeline skills (slash-command UX wrapping magent_* MCP tools) ---
  magent_constitution:
    mode: skill
    tools: [Read, Grep, Glob]
    category: spec_pipeline
    description: "Generate the project Constitution (principles + NFR targets + tech constraints) via delivery_manager + system_architect."
    inputs:
      - "project_name (string, required)"
      - "intent (string, required) — one-paragraph project intent"
      - "spec_id (string, optional) — defaults to slug+uuid"
    produces: "specs/<spec-id>/constitution.json validated against the Constitution schema."
    when: "Start of every new project, before magent_spec."
  magent_spec:
    mode: skill
    tools: [Read, Grep, Glob]
    category: spec_pipeline
    description: "Produce a schema-validated FeatureSpec with FR-### IDs (RFC 2119 verbs), Given/When/Then scenarios (validators reject tautology), and [NEEDS CLARIFICATION] markers. Driven by business_analyst."
    inputs:
      - "spec_id (string, required)"
      - "idea (string, required) — what to build, one paragraph"
    produces: "specs/<spec-id>/spec.json validated against the FeatureSpec schema."
    when: "After magent_constitution. Before magent_clarify or magent_plan."
  magent_clarify:
    mode: skill
    tools: [Read, Grep, Glob]
    category: spec_pipeline
    description: "Resolve every [NEEDS CLARIFICATION] marker on the FeatureSpec. Driven by business_analyst."
    inputs:
      - "spec_id (string, required)"
      - "answers (array of {question, answer}, optional) — pre-supplied answers"
    produces: "specs/<spec-id>/clarifications.json + an updated spec.json with no remaining clarifications."
    when: "Whenever the spec has open clarification items. Required before magent_plan."
  magent_plan:
    mode: skill
    tools: [Read, Grep, Glob]
    category: spec_pipeline
    description: "Produce an ImplementationPlan from system_architect + database_administrator + cloud_architect (parallel, merged by system_architect)."
    inputs:
      - "spec_id (string, required)"
    produces: "specs/<spec-id>/plan.json validated against the ImplementationPlan schema."
    when: "After magent_spec + magent_clarify. Gate: spec must have zero open clarifications."
  magent_tasks:
    mode: skill
    tools: [Read, Write, Grep, Glob]
    category: spec_pipeline
    description: "Decompose the plan into a TaskList (with [P] parallel-safe tags + file paths + fr_ids). For every Given/When/Then scenario, sdet emits a failing test stub in the auto-detected framework."
    inputs:
      - "spec_id (string, required)"
      - "project_root (string, optional) — used for test-framework detection; defaults to cwd"
    produces: "specs/<spec-id>/tasks.json + N failing test files under specs/<spec-id>/tests/."
    when: "After magent_plan. Gate: plan must validate."
  magent_implement:
    mode: skill
    tools: [Read, Write, Edit, Bash, Grep, Glob]
    category: spec_pipeline
    description: "Run per-task agents and emit ImplementationTrace mapping FR-IDs to commit SHAs. Refuses to advance until every failing_test_path exists on disk."
    inputs:
      - "spec_id (string, required)"
      - "task_ids (array, optional) — subset of tasks to run; default: all"
    produces: "specs/<spec-id>/implementation_trace.json + actual file edits + git commits tagged with [FR-XXX]."
    when: "After magent_tasks. Gate: tasks validate AND every failing_test_path exists."
  magent_audit:
    mode: skill
    tools: [Read, Grep, Glob, Bash]
    category: spec_pipeline
    description: "Multi-reviewer audit: delivery_manager + security_engineer + performance_engineer + qa_engineer (parallel) merged into a single Audit schema."
    inputs:
      - "spec_id (string, required)"
    produces: "specs/<spec-id>/audit.json with phase status + reviewer findings + recommendation (GO / NO-GO / GO-WITH-CONDITIONS)."
    when: "After magent_implement. Before magent_release."
  magent_release:
    mode: skill
    tools: [Read, Grep, Glob]
    category: spec_pipeline
    description: "Final release-readiness gate. Re-emits the Audit with the GO / GO-WITH-CONDITIONS decision."
    inputs:
      - "spec_id (string, required)"
    produces: "specs/<spec-id>/audit.json (overwritten) with the release decision and conditions."
    when: "After magent_audit. Gate: audit must recommend GO or GO-WITH-CONDITIONS."
  magent_validate:
    mode: skill
    tools: [Read, Bash, Grep, Glob]
    category: spec_pipeline
    description: "Schema + cross-reference validator over an entire spec directory. Catches unresolved clarifications, missing failing-test files, FR-ID drift across tasks/trace."
    inputs:
      - "spec_id (string, required)"
    produces: "JSON report with ok / loaded / missing / warnings / errors."
    when: "Anytime — before any phase to confirm upstream artifacts are clean."

# Stateful tools that have no skill/subagent equivalent and stay MCP-only.
mcp_only_tools:
  - workflows
  - specs
  - recall
  - run_pre_commit_hooks
  - parallel_orchestrator
  - code_quality_rules
