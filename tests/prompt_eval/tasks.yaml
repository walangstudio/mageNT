      Recommend a DB and explain the trade-off you're accepting.

  - id: 8
    agent: database_administrator
    title: Postgres schema indexing audit
    rubric_focus: [actionability, output_structure]
    prompt: |
      Audit this schema for missing/wrong indexes given the query patterns below.
    code: |
      CREATE TABLE orders (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        status TEXT NOT NULL,
        total_cents BIGINT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
      );
      CREATE INDEX idx_orders_status ON orders(status);

      Query patterns:
      - SELECT * FROM orders WHERE user_id = $1 ORDER BY created_at DESC LIMIT 50;
      - SELECT count(*) FROM orders WHERE status = 'pending' AND created_at > now() - interval '1 hour';
      - SELECT user_id, sum(total_cents) FROM orders WHERE created_at >= $1 AND created_at < $2 GROUP BY user_id;

  # ---- Hard tasks (Phase 6C): designed to escape rubric saturation. -----
  # These force opinionatedness under pressure, scope discipline, and
  # confidence-floor calibration — areas where vanilla baselines tend to
  # hand-wave or produce well-headed prose without a defensible position.

  - id: 9
    agent: system_architect
    title: Sharding vs caching vs replicas under pressure
    rubric_focus: [opinionatedness, scope_discipline]
    prompt: |
      Our Postgres primary is at 80% CPU and we just doubled DAU. The DBs team
      wants read replicas. The platform team wants Redis caching in front. The
      most senior backend wants to shard by tenant_id. Each has political weight
      and a slack thread of supporters. Pick ONE. Name what you give up. No
      hedging, no "depends".
  - id: 10
    agent: security_engineer
    title: Needle in a haystack — one real bug, five plausible distractors
    rubric_focus: [actionability, scope_discipline]
    prompt: |
      Review for security issues. Surface only findings you can defend with a
      concrete attack path; do not pad the report with style nits dressed up as
      vulnerabilities.
    code: |
      // service/auth.go
      package auth
      import (
        "crypto/rand"
        "crypto/sha256"
        "database/sql"
        "encoding/hex"
        "errors"
        "fmt"
        "net/http"
        "time"
      )

      var ErrInvalid = errors.New("invalid credentials")

      type Service struct{ DB *sql.DB }

      func (s *Service) NewSessionToken() (string, error) {
        b := make([]byte, 32)
        if _, err := rand.Read(b); err != nil { return "", err }
        return hex.EncodeToString(b), nil
      }

      // hashPassword uses sha256(salt|password). The salt is per-user, 16 bytes.
      func hashPassword(salt, password string) string {
        h := sha256.Sum256([]byte(salt + password))
        return hex.EncodeToString(h[:])
      }

      func (s *Service) Login(w http.ResponseWriter, r *http.Request) {
        email := r.FormValue("email")
        password := r.FormValue("password")
        var salt, hash string
        // parameterized — no SQLi
        err := s.DB.QueryRow(
          "SELECT salt, password_hash FROM users WHERE email = $1", email,
        ).Scan(&salt, &hash)
        if err != nil {
          http.Error(w, "invalid", http.StatusUnauthorized); return
        }
        if hashPassword(salt, password) != hash {
          http.Error(w, "invalid", http.StatusUnauthorized); return
        }
        tok, err := s.NewSessionToken()
        if err != nil { http.Error(w, "server error", 500); return }
        // Store session, 30-day expiry.
        _, _ = s.DB.Exec(
          "INSERT INTO sessions(token, user_email, expires_at) VALUES ($1,$2,$3)",
          tok, email, time.Now().Add(30*24*time.Hour),
        )
        http.SetCookie(w, &http.Cookie{
          Name: "session", Value: tok, Path: "/", HttpOnly: true, Secure: true,
          SameSite: http.SameSiteLaxMode, Expires: time.Now().Add(30*24*time.Hour),
        })
        fmt.Fprintln(w, "ok")
      }
