  - id: 6
    agent: qa_engineer
    title: Test cases for an auth flow
    rubric_focus: [output_structure, conciseness]
    prompt: |
      Generate the smallest set of test cases that exercises this flow.
      Group by happy path / negative / edge.
    code: |
      Auth flow (email + TOTP):
      1. POST /login {email, password} → 200 with short-lived token + requires_totp=true
      2. POST /verify-totp {token, code} → 200 with session cookie (HttpOnly, Secure)
      3. Session cookie expires after 30 minutes idle
      4. Account locks after 5 failed login attempts in 10 minutes (per email + IP)

  - id: 7
    agent: system_architect
    title: DB pick for event-sourced ledger 5k writes/s
    rubric_focus: [opinionatedness, conciseness]
    prompt: |
      We need to pick a database for an event-sourced financial ledger:
      - 5k writes/s sustained, bursts to 15k/s
