# Eight representative tasks used to compare prompt variants.
# Each task names the agent under test and the user prompt the eval harness
# will send. Optional ``code`` is appended to the user prompt; ``rubric_focus``
# tells the judge which rubric dimensions matter most for this task.

tasks:
  - id: 1
    agent: security_engineer
    title: Express route SQL injection + missing auth
    rubric_focus: [opinionatedness, output_structure, actionability]
    prompt: |
      Review this Express route for security issues. Surface every concrete
      vulnerability you find with severity, evidence, and the smallest fix.
    code: |
      const express = require('express');
      const mysql = require('mysql');
      const router = express.Router();
      const db = mysql.createConnection({ host: 'localhost', user: 'root', password: 'admin' });

      router.get('/users/:id', (req, res) => {
        const q = "SELECT * FROM users WHERE id = " + req.params.id;
        db.query(q, (err, rows) => {
          if (err) return res.status(500).send(err.message);
          res.json(rows);
        });
      });

      router.post('/users', (req, res) => {
        const { name, email, role } = req.body;
        const q = `INSERT INTO users(name, email, role) VALUES('${name}','${email}','${role}')`;
        db.query(q, (err, r) => res.json({ id: r.insertId }));
      });

      module.exports = router;

  - id: 2
    agent: system_architect
    title: Should we split this Django monolith?
    rubric_focus: [opinionatedness, scope_discipline, conciseness]
    prompt: |
