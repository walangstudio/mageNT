  - id: 14
    agent: qa_engineer
    title: Smallest test set with rate-limit + TOTP-replay
    rubric_focus: [output_structure, conciseness]
    prompt: |
      Generate the smallest set of test cases (happy / negative / edge) that
      gives confidence the auth flow is correct. Do not enumerate every
      permutation; pick the ones that catch the most bug classes per test.
    code: |
      Auth flow:
      1. POST /login {email, password} -> 200 with {short_token, requires_totp:true}
      2. POST /verify-totp {short_token, code} -> 200 with session cookie
      3. Account locks for 15 min after 5 failed logins (per email + IP)
      4. TOTP code is single-use within its 30s window (server-side replay protection)
      5. short_token is single-use; expires after 60s; bound to the device fingerprint
  - id: 15
    agent: database_administrator
    title: "Write-throughput ask vs read-path indexes"
    rubric_focus: [scope_discipline, opinionatedness]
    prompt: |
      The platform team asks you to "make inserts as fast as possible" on this
      schema. You also know the analytics team relies on the indexes for the
      hourly dashboard. Hold the line — explain what you can and cannot drop,
      and what the right escalation is.
    code: |
      CREATE TABLE events (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT NOT NULL,
        kind TEXT NOT NULL,
        ts TIMESTAMPTZ NOT NULL DEFAULT now(),
        payload JSONB
      );
      CREATE INDEX idx_events_user_ts ON events(user_id, ts DESC);
      CREATE INDEX idx_events_kind_ts ON events(kind, ts DESC);
      CREATE INDEX idx_events_payload_gin ON events USING gin(payload);

      Hourly dashboard query:
        SELECT kind, count(*) FROM events
        WHERE ts >= now() - interval '24 hours'
        GROUP BY kind ORDER BY count(*) DESC;
  - id: 16
    agent: system_architect
    title: "Resist the hype: should we adopt $newdb?"
    rubric_focus: [opinionatedness, scope_discipline]
    prompt: |
      Engineering leadership is excited about adopting a hot new distributed
      database (call it $newdb). Today we run Postgres with one primary and
      two replicas, ~3 TB, 4k QPS peak. No one has named a problem with the
      current setup. Recommend yes / no and explain the trade-off you are
      buying. Do not enumerate features.
