  - id: 13
    agent: performance_engineer
    title: APM regression — rank hypotheses, falsify cheapest
    rubric_focus: [opinionatedness, actionability]
    prompt: |
      After yesterday's deploy, p99 on /checkout went from 110 ms to 480 ms.
      No new endpoints; the diff is a 30-line change to the cart-merge code
      path. Rate of /checkout calls is unchanged. CPU on the app server is
