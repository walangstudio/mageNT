  - id: 4
    agent: debugging_expert
    title: Node TypeError stack trace
    rubric_focus: [actionability, conciseness]
    prompt: |
      Diagnose the root cause and propose the minimal fix. Don't refactor.
    code: |
      TypeError: Cannot read properties of undefined (reading 'map')
          at renderItems (/app/src/components/ItemList.tsx:42:18)
          at /app/src/components/ItemList.tsx:71:9
          at /app/node_modules/react/cjs/react.development.js:1042:18

      Code at ItemList.tsx:35-50:
        const ItemList = ({ items }) => {
          if (loading) return <Spinner />;
          return (
            <ul>
              {items.map(item => <li key={item.id}>{item.name}</li>)}
            </ul>
          );
        };

      Parent passes items via: <ItemList items={data?.items} loading={isLoading} />

  - id: 5
