# Coding eval tasks — objective pass@1 via test execution (not a judge).
# Each task: the model must produce the full contents of `solution_file`; the
# hidden `test` (the model never sees it directly; only its failure output is fed
# back during the repair loop) decides pass/fail. `held_out_test` is NEVER shown
# or fed back — it scores the FINAL code against extra edge cases, so a loop that
# games the visible assertion is caught.
#
# Languages: python (agent python_backend) and javascript (agent nodejs_backend,
# node built-in test/assert, no npm deps). Difficulty: easy | medium | hard.
tasks:
  - id: 1
    title: fizzbuzz
    agent: python_backend
    language: python
    difficulty: easy
    solution_file: solution.py
    test_file: test_solution.py
    runner: "python -m pytest test_solution.py -q"
    prompt: |
      Implement `fizzbuzz(n: int) -> str` in solution.py:
      - "Fizz" if n divisible by 3, "Buzz" if divisible by 5, "FizzBuzz" if both,
        otherwise the number as a string. Raise ValueError for n < 1.
    test: |
      import pytest
      from solution import fizzbuzz
      def test_basic():
          assert fizzbuzz(1) == "1"
          assert fizzbuzz(3) == "Fizz"
          assert fizzbuzz(5) == "Buzz"
          assert fizzbuzz(15) == "FizzBuzz"
      def test_invalid():
          with pytest.raises(ValueError):
              fizzbuzz(0)
    held_out_test: |
      import pytest
      from solution import fizzbuzz
      def test_more():
          assert fizzbuzz(30) == "FizzBuzz"
          assert fizzbuzz(9) == "Fizz"
          assert fizzbuzz(20) == "Buzz"
          assert fizzbuzz(7) == "7"
      def test_neg():
          with pytest.raises(ValueError):
              fizzbuzz(-3)

