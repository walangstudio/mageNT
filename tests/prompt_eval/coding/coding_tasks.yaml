  - id: 4
    title: LRU cache
    agent: python_backend
    language: python
    difficulty: hard
    solution_file: solution.py
    test_file: test_solution.py
    runner: "python -m pytest test_solution.py -q"
    prompt: |
      Implement class LRUCache in solution.py:
      - __init__(self, capacity: int)
      - get(self, key: int) -> int  (return -1 if key absent)
      - put(self, key: int, value: int) -> None
      Evict the least-recently-used entry when capacity is exceeded. Both get and
      put count as a use.
    test: |
      from solution import LRUCache
      def test_lru():
          c = LRUCache(2)
          c.put(1, 1); c.put(2, 2)
          assert c.get(1) == 1
          c.put(3, 3)
          assert c.get(2) == -1
          c.put(4, 4)
          assert c.get(1) == -1
          assert c.get(3) == 3
          assert c.get(4) == 4
    held_out_test: |
      from solution import LRUCache
      def test_update_existing():
          c = LRUCache(2)
          c.put(1, 1); c.put(2, 2)
          c.put(1, 10)
          c.put(3, 3)
          assert c.get(2) == -1
          assert c.get(1) == 10
          assert c.get(3) == 3
      def test_cap1():
          c = LRUCache(1)
          c.put(1, 1); c.put(2, 2)
          assert c.get(1) == -1
          assert c.get(2) == 2

