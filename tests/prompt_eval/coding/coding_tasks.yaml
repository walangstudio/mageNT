  - id: 7
    title: RLE round-trip
    agent: python_backend
    language: python
    difficulty: medium
    solution_file: solution.py
    test_file: test_solution.py
    runner: "python -m pytest test_solution.py -q"
    prompt: |
      Implement rle_encode(s: str) -> str and rle_decode(s: str) -> str in
      solution.py for lowercase-letter strings. Encode each run as <count><char>,
      e.g. 'aaabbc' -> '3a2b1c'. Counts may be multi-digit. Decode reverses it.
      rle_decode(rle_encode(s)) must equal s; the empty string round-trips to ''.
    test: |
      from solution import rle_encode, rle_decode
      def test_rle():
          assert rle_encode('aaabbc') == '3a2b1c'
          assert rle_decode('3a2b1c') == 'aaabbc'
          assert rle_encode('') == ''
          assert rle_decode('') == ''
          assert rle_decode('11a1b') == 'a'*11 + 'b'
          for s in ['', 'a', 'abc', 'aaaa', 'aabbbbccccc', 'z'*11]:
              assert rle_decode(rle_encode(s)) == s
    held_out_test: |
      from solution import rle_encode, rle_decode
      def test_more():
          assert rle_encode('a'*123) == '123a'
          assert rle_decode('123a') == 'a'*123
          for s in ['mississippi', 'a'*100 + 'b'*7, 'abcdefg']:
              assert rle_decode(rle_encode(s)) == s

